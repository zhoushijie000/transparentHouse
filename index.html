const PROJECT_DETAIL_PATH = "./project-detail.html";
const propertyFilterMeta = [
  { projectId: "home-greenland", region: "天府新区", roomTypes: [3, 4] },
  { projectId: "home-jinjiang", region: "锦江区", roomTypes: [4, 5] },
  { projectId: "home-tianyue", region: "武侯区", roomTypes: [3, 4] },
  { projectId: "home-luhu", region: "天府新区", roomTypes: [4] },
  { projectId: "home-guanghe", region: "龙泉驿区", roomTypes: [3] },
  { projectId: "home-qingyun", region: "青羊区", roomTypes: [3, 4] }
];

properties.forEach((property, index) => {
  const meta = propertyFilterMeta[index];
  if (meta) {
    Object.assign(property, meta);
  }
});

const searchInput = document.querySelector("#searchInput");
const openFilterButton = document.querySelector("#openFilterButton");
const filterModal = document.querySelector("#filterModal");
const filterBackdrop = document.querySelector("#filterBackdrop");
const closeFilterButton = document.querySelector("#closeFilterButton");
const regionFilter = document.querySelector("#regionFilter");
const sectorFilter = document.querySelector("#sectorFilter");
const roomFilter = document.querySelector("#roomFilter");
const areaFilter = document.querySelector("#areaFilter");
const priceFilter = document.querySelector("#priceFilter");
const resetFiltersButton = document.querySelector("#resetFiltersButton");
const applyFilterButton = document.querySelector("#applyFilterButton");
const filterSummary = document.querySelector("#filterSummary");
const propertyList = document.querySelector("#propertyList");
const emptyState = document.querySelector("#emptyState");
const filterControls = [searchInput, regionFilter, sectorFilter, roomFilter, areaFilter, priceFilter];

function setFilterModalVisibility(visible) {
  filterModal.classList.toggle("hidden", !visible);
  document.body.classList.toggle("overflow-hidden", visible);
  openFilterButton.setAttribute("aria-expanded", String(visible));
}

function getActiveFilterCount() {
  return [
    regionFilter.value,
    sectorFilter.value,
    roomFilter.value,
    areaFilter.value,
    priceFilter.value
  ].filter(Boolean).length;
}

function getSelectedPriceRange(value) {
  if (!value) {
    return null;
  }

  if (value.endsWith("+")) {
    return { min: Number(value.replace("+", "")), max: Number.POSITIVE_INFINITY };
  }

  const [min, max] = value.split("-").map(Number);
  return { min, max };
}

function getSelectedAreaRange(value) {
  if (!value) {
    return null;
  }

  if (value === "144+") {
    return { min: 144, max: Number.POSITIVE_INFINITY };
  }

  const [min, max] = value.split("-").map(Number);
  return { min, max };
}

function getPropertySizeRange(property) {
  const match = property.sizeRange.match(/(\d+(?:\.\d+)?)\s*-\s*(\d+(?:\.\d+)?)/);
  if (!match) {
    return { min: 0, max: Number.POSITIVE_INFINITY };
  }

  return {
    min: Number(match[1]),
    max: Number(match[2])
  };
}

function getPropertyRooms(property) {
  if (Array.isArray(property.roomTypes)) {
    return property.roomTypes;
  }

  const rooms = [...property.unitMeta.matchAll(/(\d+)房/g)].map((match) => Number(match[1]));
  return rooms.length ? rooms : [];
}

function populateFilterOptions() {
  const regions = [...new Set(properties.map((property) => property.region))];
  const sectors = [...new Set(properties.map((property) => property.sector))];
  const rooms = [...new Set(properties.flatMap(getPropertyRooms))].sort((left, right) => left - right);

  regionFilter.innerHTML = [
    '<option value="">全部区域</option>',
    ...regions.map((region) => `<option value="${region}">${region}</option>`)
  ].join("");

  sectorFilter.innerHTML = [
    '<option value="">全部板块</option>',
    ...sectors.map((sector) => `<option value="${sector}">${sector}</option>`)
  ].join("");

  roomFilter.innerHTML = [
    '<option value="">全部户型</option>',
    ...rooms.map((room) => `<option value="${room}">${room}室</option>`)
  ].join("");
}

function getBadgeClasses(tone) {
  return tone === "primary"
    ? "bg-primary/90 text-on-primary"
    : "bg-tertiary-fixed/90 text-on-tertiary-fixed";
}

function getProjectDetailUrl(property) {
  const projectId = property.projectId || "home-greenland";
  return `${PROJECT_DETAIL_PATH}?projectId=${encodeURIComponent(projectId)}`;
}

function renderProperties(list) {
  propertyList.innerHTML = list.map((property) => {
    const imageSlides = property.images.map((image, index) => `
<div class="flex-none ${index === 0 ? "w-full" : "w-[85%]"} snap-start relative" data-slide-index="${index + 1}">
<img alt="${property.name} 图片 ${index + 1}" class="w-full h-full object-cover" loading="lazy" src="${image}"/>
${index === 0 ? `<div class="absolute top-3 left-3 flex gap-2"><span class="${getBadgeClasses(property.badgeTone)} px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider font-label backdrop-blur-md">${property.badge}</span></div>` : ""}
</div>`.trim()).join("");

    const tagList = property.tags.map((tag) => `<span class="bg-surface-container-high px-2.5 py-0.5 rounded-full text-[11px] font-label font-semibold text-primary">${tag}</span>`).join("");

    return `
<div class="group relative bg-surface-container-lowest rounded-xl overflow-hidden border border-outline-variant/10 shadow-sm transition-all duration-300 active:ring-2 active:ring-primary/20">
<a aria-label="查看项目详情" class="card-link" href="${getProjectDetailUrl(property)}"></a>
<div class="card-media relative overflow-x-auto flex snap-x snap-mandatory hide-scrollbar gap-2 h-52 scroll-smooth" data-carousel>
${imageSlides}
<div class="pointer-events-none absolute bottom-3 right-3 z-30 rounded-full bg-black/45 px-2.5 py-1 text-[10px] font-label font-bold tracking-wide text-white backdrop-blur-md" data-carousel-indicator>1/${property.images.length}</div>
</div>
<div class="p-4">
<div class="flex flex-col gap-2 mb-3">
<div>
<h2 class="text-[24px] font-bold font-headline text-primary leading-tight">${property.name}</h2>
<p class="text-secondary font-body flex items-center gap-1 text-xs mt-1">
<svg aria-hidden="true" class="h-[14px] w-[14px] flex-none" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 0-7 7c0 4.78 5.34 11.74 6.07 12.68a1.16 1.16 0 0 0 1.86 0C13.66 20.74 19 13.78 19 9a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5Z"/></svg>
${property.location}
</p>
</div>
<div>
<p class="text-lg font-extrabold font-headline text-primary">¥${property.priceMin}万 - ${property.priceMax}万</p>
</div>
</div>
<div class="flex flex-wrap gap-1.5 mb-4">
${tagList}
</div>
<div class="grid grid-cols-2 gap-x-3 gap-y-4 py-4 border-t border-outline-variant/10">
<div class="space-y-0.5">
<p class="text-[9px] font-label font-bold text-outline uppercase tracking-wider">面积区间</p>
<p class="text-xs font-semibold font-body">${property.sizeRange}</p>
</div>
<div class="space-y-0.5">
<p class="text-[9px] font-label font-bold text-outline uppercase tracking-wider">所属区域</p>
<p class="text-xs font-semibold font-body">${property.region}</p>
</div>
<div class="space-y-0.5">
<p class="text-[9px] font-label font-bold text-outline uppercase tracking-wider">所属板块</p>
<p class="text-xs font-semibold font-body">${property.sector}</p>
</div>
<div class="space-y-0.5">
<p class="text-[9px] font-label font-bold text-outline uppercase tracking-wider">梯户比</p>
<p class="text-xs font-semibold font-body">${property.elevatorRatio}</p>
</div>
</div>
<div class="mt-4 flex justify-center">
<span class="text-[10px] text-outline flex items-center gap-1 font-label">
点击进入项目详情
<svg aria-hidden="true" class="h-[12px] w-[12px] flex-none" fill="currentColor" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6-1.41-1.41L12.17 12 7.59 7.41 9 6Z"/></svg>
</span>
</div>
</div>
</div>`.trim();
  }).join("");
  bindMediaCarousels();
}

function getCurrentSlideIndex(track) {
  const slides = Array.from(track.querySelectorAll("[data-slide-index]"));
  if (!slides.length) {
    return 1;
  }

  const closestSlide = slides.reduce((best, slide, index) => {
    const delta = Math.abs(track.scrollLeft - slide.offsetLeft);
    if (delta < best.delta) {
      return { index, delta };
    }
    return best;
  }, { index: 0, delta: Number.POSITIVE_INFINITY });

  return closestSlide.index + 1;
}

function bindMediaCarousels() {
  const carousels = propertyList.querySelectorAll("[data-carousel]");
  carousels.forEach((track) => {
    const indicator = track.querySelector("[data-carousel-indicator]");
    const slides = track.querySelectorAll("[data-slide-index]");
    if (!indicator || !slides.length) {
      return;
    }

    let frameId = 0;
    const syncIndicator = () => {
      indicator.textContent = `${getCurrentSlideIndex(track)}/${slides.length}`;
    };

    track.addEventListener("scroll", () => {
      cancelAnimationFrame(frameId);
      frameId = requestAnimationFrame(syncIndicator);
    }, { passive: true });

    syncIndicator();
  });
}

function applyFilters() {
  const keyword = searchInput.value.trim().toLowerCase();
  const region = regionFilter.value;
  const sector = sectorFilter.value;
  const room = roomFilter.value;
  const areaRange = getSelectedAreaRange(areaFilter.value);
  const priceRange = getSelectedPriceRange(priceFilter.value);
  const hasActiveFilters = Boolean(keyword || region || sector || room || areaFilter.value || priceFilter.value);
  const filteredProperties = properties.filter((property) => {
    const searchPool = [
      property.name,
      property.location,
      property.region,
      property.sector,
      ...getPropertyRooms(property).map((roomType) => `${roomType}室`),
      ...property.tags,
      ...property.features
    ].join(" ").toLowerCase();
    const sizeRange = getPropertySizeRange(property);

    const matchesKeyword = !keyword || searchPool.includes(keyword);
    const matchesRegion = !region || property.region === region;
    const matchesSector = !sector || property.sector === sector;
    const matchesRoom = !room || getPropertyRooms(property).includes(Number(room));
    const matchesArea = !areaRange || (sizeRange.min <= areaRange.max && sizeRange.max >= areaRange.min);
    const matchesPrice = !priceRange || (property.priceMin <= priceRange.max && property.priceMax >= priceRange.min);

    return matchesKeyword && matchesRegion && matchesSector && matchesRoom && matchesArea && matchesPrice;
  });

  renderProperties(filteredProperties);

  filterSummary.textContent = hasActiveFilters
    ? `筛选后找到 ${filteredProperties.length} 个在售楼盘`
    : `共 ${filteredProperties.length} 个在售楼盘`;
  emptyState.classList.toggle("hidden", filteredProperties.length !== 0);
  resetFiltersButton.disabled = !hasActiveFilters;
  applyFilterButton.textContent = `查看 ${filteredProperties.length} 个楼盘`;
  const activeFilterCount = getActiveFilterCount();
  openFilterButton.textContent = activeFilterCount ? `筛选 · ${activeFilterCount}` : "筛选";
}

openFilterButton.addEventListener("click", () => {
  setFilterModalVisibility(true);
});

closeFilterButton.addEventListener("click", () => {
  setFilterModalVisibility(false);
});

filterBackdrop.addEventListener("click", () => {
  setFilterModalVisibility(false);
});

applyFilterButton.addEventListener("click", () => {
  setFilterModalVisibility(false);
});

resetFiltersButton.addEventListener("click", () => {
  regionFilter.value = "";
  sectorFilter.value = "";
  roomFilter.value = "";
  areaFilter.value = "";
  priceFilter.value = "";
  applyFilters();
});

filterControls.forEach((control) => {
  const eventName = control.tagName === "INPUT" ? "input" : "change";
  control.addEventListener(eventName, applyFilters);
});

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape" && !filterModal.classList.contains("hidden")) {
    setFilterModalVisibility(false);
  }
});

populateFilterOptions();
setFilterModalVisibility(false);
applyFilters();
</script>
