<script>
const tabButtons = [...document.querySelectorAll(".data-tab")];
const panels = [...document.querySelectorAll("[data-panel]")];

const properties = [
  { id: "p1", name: "繁花里", district: "邛崃市", priceMin: 8301, priceMax: 11667, areaMin: 68.64, areaMax: 153.53, tags: ["清水", "住宅", "容积率1.5"], signed30: 286, stock: 286, total: 445, record: "8301~11667元/㎡", open: "1-7栋", layout: ["2室2厅1卫 68㎡", "3室2厅2卫 98㎡", "4室2厅2卫 126㎡"], intro: "项目位于邛崃主城片区，兼顾刚需与改善，生活配套成熟。", img: "i1", deco: "clear" },
  { id: "p2", name: "世邦昆仑府·朴樾", district: "金堂县", priceMin: 6488, priceMax: 10764, areaMin: 79.9, areaMax: 168.31, tags: ["清水", "低密", "容积率2.25"], signed30: 161, stock: 161, total: 312, record: "6488~10764元/㎡", open: "2-11栋", layout: ["3室2厅2卫 92㎡", "3室2厅2卫 116㎡", "4室2厅2卫 138㎡"], intro: "项目强调景观与舒适度，多面积段可选。", img: "i2", deco: "clear" },
  { id: "p3", name: "凯瑞·望丛天序", district: "郫都区", priceMin: 14177, priceMax: 37684, areaMin: 90.91, areaMax: 248.56, tags: ["清水", "精装", "容积率2.0"], signed30: 109, stock: 109, total: 260, record: "14177~37684元/㎡", open: "3-9栋", layout: ["3室2厅2卫 101㎡", "4室2厅2卫 143㎡", "5室2厅3卫 188㎡"], intro: "改善型定位，近产业区和教育配套。", img: "i3", deco: "refined" },
  { id: "p4", name: "中旅·紫金名邸", district: "双流区", priceMin: 21340, priceMax: 27726, areaMin: 114.61, areaMax: 142.74, tags: ["清水", "住宅", "容积率1.5"], signed30: 120, stock: 120, total: 220, record: "21340~27726元/㎡", open: "1-6栋", layout: ["3室2厅2卫 115㎡", "4室2厅2卫 128㎡", "4室2厅2卫 142㎡"], intro: "双流主城板块，低密居住社区。", img: "i4", deco: "clear" },
  { id: "p5", name: "龙湖天曜", district: "高新区", priceMin: 23200, priceMax: 31800, areaMin: 95, areaMax: 179, tags: ["精装", "地铁沿线", "容积率2.2"], signed30: 428, stock: 96, total: 398, record: "23200~31800元/㎡", open: "1-8栋", layout: ["3室2厅2卫 105㎡", "4室2厅2卫 139㎡", "4室2厅3卫 178㎡"], intro: "高新区核心居住片区，改善产品为主。", img: "i5", deco: "refined" },
  { id: "p6", name: "城投锦澜台", district: "成华区", priceMin: 18800, priceMax: 25800, areaMin: 84, areaMax: 143, tags: ["清水", "准现房", "容积率1.8"], signed30: 176, stock: 143, total: 360, record: "18800~25800元/㎡", open: "2-10栋", layout: ["2室2厅1卫 84㎡", "3室2厅2卫 108㎡", "4室2厅2卫 136㎡"], intro: "生活与商业配套成熟，覆盖首置和改善客群。", img: "i6", deco: "clear" }
];

const months = ["2025-03", "2025-04", "2025-05", "2025-06", "2025-07", "2025-08", "2025-09", "2025-10", "2025-11", "2025-12", "2026-01", "2026-02"];
const factors = [0.89, 0.91, 0.94, 0.97, 1.01, 1.04, 1.08, 1.03, 0.98, 0.94, 0.77, 1.0];
const base = [
  { region: "成都市", u: 324, a: 38560, p: 18950, t: 225 },
  { region: "高新区", u: 77, a: 9940, p: 27680, t: 289 },
  { region: "天府新区", u: 69, a: 8840, p: 26180, t: 267 },
  { region: "双流区", u: 51, a: 6240, p: 23370, t: 228 },
  { region: "郫都区", u: 45, a: 5450, p: 17890, t: 179 },
  { region: "龙泉驿区", u: 40, a: 4720, p: 15980, t: 154 },
  { region: "青白江区", u: 23, a: 2700, p: 10940, t: 106 },
  { region: "金堂县", u: 19, a: 2270, p: 9670, t: 95 }
];

const marketData = {};
months.forEach((month, index) => {
  marketData[month] = base.map((row, rowIndex) => {
    const factor = factors[index] * (1 + rowIndex * 0.008);
    return {
      region: row.region,
      units: Math.round(row.u * factor),
      area: Math.round(row.a * factor),
      dealRange: buildDealRange(row.t, rowIndex, index)
    };
  });
});

const dealPatterns = [
  { building: 1, unit: 1, floor: 6, roomSeq: 1, priceDelta: -300 },
  { building: 1, unit: 2, floor: 9, roomSeq: 2, priceDelta: -80 },
  { building: 2, unit: 1, floor: 12, roomSeq: 1, priceDelta: 120 },
  { building: 2, unit: 2, floor: 15, roomSeq: 2, priceDelta: 260 },
  { building: 3, unit: 1, floor: 18, roomSeq: 1, priceDelta: 420 },
  { building: 3, unit: 2, floor: 22, roomSeq: 2, priceDelta: 680 }
];

const $ = (id) => document.getElementById(id);

function num(value) {
  return Number(value).toLocaleString("zh-CN");
}

function pad2(value) {
  return String(value).padStart(2, "0");
}

function parseAreaValue(layoutText) {
  const match = layoutText.match(/(\d+(?:\.\d+)?)㎡/);
  return match ? Number(match[1]) : 89;
}

function formatTotalPrice(totalPrice) {
  return `${(totalPrice / 10000).toFixed(1)}万`;
}

function buildDealRange(totalValue, rowIndex, monthIndex) {
  const min = Math.round(totalValue * (0.86 + rowIndex * 0.01));
  const max = Math.round(totalValue * (1.34 + monthIndex * 0.004 + rowIndex * 0.015));
  return `${min}~${max}万`;
}

function formatMonthLabel(month) {
  const [year, monthValue] = month.split("-");
  return `${year.slice(2)}年${Number(monthValue)}月`;
}

function formatMonthAxis(month) {
  return `${Number(month.split("-")[1])}月`;
}

function buildDealRecords() {
  return properties.flatMap((property, propertyIndex) => {
    const spread = Math.max(property.priceMax - property.priceMin, 1200);

    return dealPatterns.map((pattern, patternIndex) => {
      const layoutText = property.layout[patternIndex % property.layout.length];
      const area = parseAreaValue(layoutText);
      const unitPrice = Math.max(
        property.priceMin,
        Math.min(
          property.priceMax,
          property.priceMin + Math.round((spread * (patternIndex + 1)) / (dealPatterns.length + 1)) + pattern.priceDelta
        )
      );
      const totalPrice = Math.round(area * unitPrice);
      const day = 28 - ((propertyIndex * dealPatterns.length + patternIndex) % 18);
      const roomNo = `${pattern.floor}${pad2(pattern.roomSeq)}`;

      return {
        id: `${property.id}-deal-${patternIndex + 1}`,
        projectId: property.id,
        projectName: property.name,
        district: property.district,
        roomLabel: `${pattern.building}栋-${pattern.unit}单元-${pattern.floor}层-${roomNo}`,
        areaText: `${area}㎡`,
        totalPriceText: `${formatTotalPrice(totalPrice)}（约${num(unitPrice)}元/㎡）`,
        signTime: `2026-03-${pad2(day)}`,
        searchText: `${property.name} ${pattern.building}栋 ${pattern.unit}单元 ${pattern.floor}层 ${roomNo}`.toLowerCase()
      };
    });
  }).sort((left, right) => right.signTime.localeCompare(left.signTime));
}

const dealRecords = buildDealRecords();

function trend(region) {
  const units = [];
  months.forEach((month) => {
    const row = marketData[month].find((item) => item.region === region);
    units.push(row.units);
  });
  return { units };
}

function drawBars(canvas, values, color, yFormatter, topFormatter) {
  const context = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const width = canvas.clientWidth;
  const height = canvas.clientHeight;

  canvas.width = width * dpr;
  canvas.height = height * dpr;
  context.setTransform(dpr, 0, 0, dpr, 0, 0);
  context.clearRect(0, 0, width, height);

  const left = 28;
  const right = width - 8;
  const top = 16;
  const bottom = height - 28;
  const chartWidth = right - left;
  const chartHeight = bottom - top;
  const maxValue = Math.max(...values, 0);
  const safeMax = maxValue || 1;

  context.strokeStyle = "#e6eefc";
  for (let index = 0; index <= 4; index += 1) {
    const y = top + (chartHeight * index) / 4;
    context.beginPath();
    context.moveTo(left, y);
    context.lineTo(right, y);
    context.stroke();
  }

  context.fillStyle = "#7b8ca8";
  context.font = "10px sans-serif";
  context.fillText(yFormatter(safeMax), 0, top + 3);
  context.fillText(yFormatter(Math.round(safeMax / 2)), 0, top + chartHeight / 2 + 3);
  context.fillText(yFormatter(0), 0, bottom + 3);

  const slot = chartWidth / values.length;
  const barWidth = Math.max(10, Math.min(18, slot * 0.58));
  values.forEach((value, index) => {
    const x = left + index * slot + (slot - barWidth) / 2;
    const y = bottom - (value / safeMax) * chartHeight;
    context.fillStyle = color;
    context.fillRect(x, y, barWidth, bottom - y);
    context.fillStyle = "#4f6485";
    context.font = "8.5px sans-serif";
    context.fillText(topFormatter(value), x - 2, Math.max(y - 4, 10));
    context.fillStyle = "#7b8ca8";
    context.font = "9px sans-serif";
    context.fillText(formatMonthAxis(months[index]), x - 2, height - 9);
  });
}

function renderMonthChips(targetId, values, suffix, formatter) {
  $(targetId).innerHTML = months.map((month, index) => `
    <span class="data-chip"><b>${formatMonthLabel(month)}</b>${formatter(values[index])}${suffix}</span>
  `).join("");
}

function renderMarket() {
  const month = "2026-02";
  const rows = marketData[month];
  $("marketBody").innerHTML = rows.map((row) => `
    <tr>
      <td>${row.region}</td>
      <td>${num(row.units)}</td>
      <td>${num(row.area)}</td>
      <td>${row.dealRange}</td>
    </tr>
  `).join("");

  const series = trend($("areaSel").value);
  drawBars($("cUnits"), series.units, "#1f6dff", (value) => `${Math.round(value)}套`, (value) => Math.round(value));
  renderMonthChips("cUnitsData", series.units, "套", (value) => num(value));
}

function renderDeals() {
  const query = $("dealSearch").value.trim().toLowerCase();
  const list = dealRecords.filter((record) => !query || record.searchText.includes(query));

  $("dealTip").textContent = `共 ${list.length} 套网签记录`;
  $("dealList").innerHTML = list.length
    ? list.map((record) => `
      <article class="data-deal">
        <div class="data-deal-head">
          <div>
            <h4>${record.projectName}</h4>
            <p class="data-deal-house">${record.roomLabel}</p>
          </div>
          <span class="data-deal-time">${record.signTime}</span>
        </div>
        <div class="data-deal-grid">
          <div class="data-deal-meta">
            <label>面积</label>
            <b>${record.areaText}</b>
          </div>
          <div class="data-deal-meta">
            <label>挂牌价</label>
            <b>${record.totalPriceText}</b>
          </div>
        </div>
      </article>
    `).join("")
    : '<div class="data-empty">未匹配到楼盘成交数据</div>';
}

function setActiveTab(target) {
  tabButtons.forEach((button) => {
    const isActive = button.dataset.tabTarget === target;
    button.classList.toggle("data-tab-active", isActive);
    button.classList.toggle("data-tab-inactive", !isActive);
    button.classList.toggle("ring-1", !isActive);
    button.classList.toggle("ring-outline-variant/15", !isActive);
  });

  panels.forEach((panel) => {
    panel.classList.toggle("hidden", panel.dataset.panel !== target);
  });

  if (target === "market") {
    renderMarket();
  } else if (target === "deals") {
    renderDeals();
  }
}

function init() {
  const jan = marketData["2026-01"].find((item) => item.region === "成都市");
  const feb = marketData["2026-02"].find((item) => item.region === "成都市");
  const monthRate = ((feb.units - jan.units) / jan.units * 100).toFixed(0);
  const topDeal = [...properties].sort((left, right) => right.signed30 - left.signed30)[0];

  $("areaSel").innerHTML = base.map((item) => `<option value="${item.region}">${item.region}</option>`).join("");
  $("areaSel").value = "成都市";
  $("mUnits").textContent = feb.units;
  $("mRate").textContent = `${monthRate > 0 ? "+" : ""}${monthRate}%`;
  $("topName").textContent = topDeal.name;
  $("topCount").textContent = `${topDeal.signed30}套`;

  tabButtons.forEach((button) => {
    button.addEventListener("click", () => {
      setActiveTab(button.dataset.tabTarget);
    });
  });

  $("areaSel").addEventListener("change", renderMarket);
  $("dealSearch").addEventListener("input", renderDeals);
  window.addEventListener("resize", () => {
    if (!document.querySelector('[data-panel="market"]').classList.contains("hidden")) {
      renderMarket();
    }
  });

  setActiveTab("market");
}

init();
</script>
</body>
</html>
