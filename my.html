<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>透明房产 - 我的</title>
<style>
:root{
  --brand:#2f76f6;
  --brand-dark:#00325b;
  --text:#1f2937;
  --muted:#6b7280;
  --line:#e5e7eb;
  --page:#f1f1f1;
  --card:#ffffff;
}
*{box-sizing:border-box}
html,body{min-height:100%;margin:0}
body{
  font-family:"PingFang SC","Microsoft YaHei","Segoe UI",Arial,sans-serif;
  background:#eef2f6;
  color:var(--text);
}
a{text-decoration:none;color:inherit}
button,input{font:inherit}
.shell{
  min-height:100dvh;
  display:flex;
  justify-content:center;
}
.app{
  position:relative;
  width:100%;
  max-width:430px;
  min-height:100dvh;
  overflow:hidden;
  background:var(--page);
}
.topbar{
  position:relative;
  z-index:5;
  height:58px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:0 6px;
  background:#fff;
  border-bottom:1px solid #edf0f3;
}
.nav-pair,
.top-actions{
  display:flex;
  align-items:center;
  height:34px;
}
.nav-pair{
  justify-self:start;
  border:1px solid #f0f2f5;
}
.top-actions{
  justify-self:end;
  border:1px solid #f0f2f5;
}
.nav-button,
.action-button{
  width:39px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#111827;
  background:#fff;
}
.nav-button + .nav-button,
.action-button + .action-button{
  border-left:1px solid #f0f2f5;
}
.top-title{
  margin:0;
  font-size:18px;
  font-weight:700;
  letter-spacing:.02em;
}
.hero{
  position:relative;
  min-height:150px;
  padding:24px 18px 58px;
  background:
    radial-gradient(circle at 95% -10%, rgba(255,255,255,.12) 0 64px, transparent 65px),
    radial-gradient(circle at 82% 50%, rgba(255,255,255,.08) 0 58px, transparent 59px),
    linear-gradient(135deg,#2f77f7 0%,#357df5 52%,#438cf7 100%);
  overflow:hidden;
}
.profile{
  position:relative;
  z-index:1;
  display:flex;
  align-items:center;
  gap:14px;
}
.avatar{
  width:62px;
  height:62px;
  border-radius:50%;
  overflow:hidden;
  border:3px solid rgba(255,255,255,.72);
  background:#dbe7ff;
  box-shadow:0 10px 22px rgba(10,52,127,.22);
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.profile-name{
  margin:0;
  color:#fff;
  font-size:20px;
  font-weight:800;
  line-height:1.2;
}
.profile-phone{
  margin:8px 0 0;
  color:rgba(255,255,255,.86);
  font-size:15px;
  letter-spacing:.02em;
}
.quick-row{
  position:relative;
  z-index:8;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:0 18px;
  margin-top:-32px;
}
.quick-card{
  min-height:70px;
  display:flex;
  align-items:center;
  gap:13px;
  padding:0 18px;
  border-radius:8px;
  background:#fff;
  box-shadow:0 8px 20px rgba(31,41,55,.07);
}
.quick-icon{
  width:32px;
  height:32px;
  flex:0 0 32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  color:#fff;
}
.quick-icon.follow{background:linear-gradient(135deg,#7fb4ff,#2f76f6)}
.quick-icon.footprint{background:linear-gradient(135deg,#31d6bd,#15b8a6)}
.quick-card span{
  font-size:15px;
  font-weight:700;
  color:#4b5563;
}
.blank-space{
  min-height:calc(100dvh - 58px - 150px - 70px - 86px);
}
.bottom-nav{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  min-height:86px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  align-items:start;
  padding:10px 0 calc(18px + env(safe-area-inset-bottom));
  border-radius:8px 8px 0 0;
  background:#fff;
  box-shadow:0 -8px 24px rgba(17,24,39,.08);
}
.bottom-item{
  min-height:56px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  color:#9aa3b2;
  font-size:11px;
  font-weight:600;
}
.bottom-item svg{
  width:22px;
  height:22px;
}
.bottom-item.is-active{
  color:var(--brand-dark);
  font-weight:800;
}
.bottom-item.is-active .nav-avatar{
  background:#e7f0ff;
  color:#2f76f6;
}
.nav-avatar{
  width:24px;
  height:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
}
@media (max-width:360px){
  .quick-row{gap:10px;padding:0 14px}
  .quick-card{padding:0 12px}
}
</style>
</head>
<body>
<div class="shell">
<div class="app">
  <header class="topbar">
    <div class="nav-pair" aria-label="页面导航">
      <a class="nav-button" href="javascript:history.back()" aria-label="返回">
        <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="m15 5-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <a class="nav-button" href="./index.html" aria-label="首页">
        <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="m4 11 8-6 8 6v9h-5v-6H9v6H4v-9Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      </a>
    </div>
    <h1 class="top-title">我的</h1>
    <div class="top-actions" aria-label="页面操作">
      <span class="action-button" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="6" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="18" cy="12" r="1.8"/></svg>
      </span>
      <span class="action-button" aria-hidden="true">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="7" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="2.8" fill="currentColor"/></svg>
      </span>
    </div>
  </header>

  <main>
    <section class="hero" id="login" aria-label="登录信息">
      <a class="profile" href="#login" aria-label="登录">
        <span class="avatar">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=160&q=80" alt="用户头像"/>
        </span>
        <span>
          <strong class="profile-name">李四</strong>
          <span class="profile-phone">510********7654</span>
        </span>
      </a>
    </section>

    <section class="quick-row" aria-label="我的功能">
      <a class="quick-card" href="#follow">
        <span class="quick-icon follow" aria-hidden="true">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 4.5 5.8v5.7c0 4.7 3.2 7.9 7.5 9.5 4.3-1.6 7.5-4.8 7.5-9.5V5.8L12 3Zm3.7 7.3-4.4 4.5-2.5-2.5 1.3-1.3 1.2 1.2 3.1-3.2 1.3 1.3Z"/></svg>
        </span>
        <span>我的关注</span>
      </a>
      <a class="quick-card" href="#history">
        <span class="quick-icon footprint" aria-hidden="true">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="currentColor"><path d="M7.7 10.6c1.4 0 2.6-1.3 2.6-3S9.1 4.7 7.7 4.7 5.1 6 5.1 7.6s1.2 3 2.6 3Zm8.7 0c1.4 0 2.5-1.3 2.5-3s-1.1-2.9-2.5-2.9-2.6 1.3-2.6 2.9 1.2 3 2.6 3ZM12 13c-3 0-5.7 2.4-5.7 5.1 0 1.5 1.3 2.2 2.5 1.6.9-.4 1.9-.7 3.2-.7s2.3.3 3.2.7c1.2.6 2.5-.1 2.5-1.6 0-2.7-2.7-5.1-5.7-5.1Z"/></svg>
        </span>
        <span>我的足迹</span>
      </a>
    </section>

    <div class="blank-space" aria-hidden="true"></div>
  </main>

  <nav class="bottom-nav" aria-label="主菜单">
    <a class="bottom-item" href="./index.html">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="none"><path d="m4 11 8-6 8 6v9h-5v-6H9v6H4v-9Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
      <span>首页</span>
    </a>
    <a class="bottom-item" href="./data.html">
      <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M5 9h3v10H5V9Zm5-4h4v14h-4V5Zm6 7h3v7h-3v-7Z"/></svg>
      <span>数据</span>
    </a>
    <a class="bottom-item is-active" href="./my.html" aria-current="page">
      <span class="nav-avatar">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-3.33 0-6 1.79-6 4v1h12v-1c0-2.21-2.67-4-6-4Z"/></svg>
      </span>
      <span>我的</span>
    </a>
  </nav>
</div>
</div>
</body>
</html>
