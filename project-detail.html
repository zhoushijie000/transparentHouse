<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>楼盘详情</title>
  <link rel="stylesheet" href="./project-detail.css">
</head>
<body>
  <main class="detail-shell">
    <section class="detail-app">
      <div id="svgStage" class="svg-stage">
        <object
          id="detailSvgObject"
          class="detail-svg"
          type="image/svg+xml"
          data="./project-detail-design.svg"
          aria-label="楼盘详情设计图"
        ></object>

        <button id="backHotspot" class="hotspot hotspot--back" type="button" aria-label="返回"></button>
        <button id="followHotspot" class="hotspot hotspot--follow" type="button" aria-label="关注楼盘"></button>
        <button id="expandHotspot" class="hotspot hotspot--expand" type="button" aria-label="展开全部信息"></button>
      </div>

      <div class="bottom-actions">
        <button id="qrButton" class="qr-button" type="button">
          <span class="qr-button__icon" aria-hidden="true"></span>
          <span>二维码</span>
        </button>
        <a id="contactButton" class="contact-button" href="tel:4000000000">联系开发商</a>
      </div>
    </section>
  </main>

  <div id="infoSheet" class="sheet" hidden>
    <div class="sheet__mask" data-close-sheet="true"></div>
    <div class="sheet__panel" role="dialog" aria-modal="true" aria-labelledby="infoSheetTitle">
      <div class="sheet__handle" aria-hidden="true"></div>
      <div class="sheet__header">
        <h2 id="infoSheetTitle">全部楼盘信息</h2>
        <button id="infoSheetClose" class="sheet__close" type="button" aria-label="关闭">×</button>
      </div>
      <div id="infoSheetRows" class="sheet__rows"></div>
    </div>
  </div>

  <div id="qrModal" class="sheet" hidden>
    <div class="sheet__mask" data-close-qr="true"></div>
    <div class="sheet__panel sheet__panel--center" role="dialog" aria-modal="true" aria-labelledby="qrModalTitle">
      <button id="qrCloseButton" class="sheet__close sheet__close--top" type="button" aria-label="关闭">×</button>
      <h2 id="qrModalTitle">项目二维码</h2>
      <p id="qrModalDesc" class="qr-modal__desc">扫码可直接打开当前项目详情</p>
      <div class="qr-modal__image-wrap">
        <img id="qrImage" class="qr-modal__image" alt="项目二维码">
      </div>
      <p id="qrLinkText" class="qr-modal__link"></p>
      <p id="qrHint" class="qr-modal__hint"></p>
      <button id="copyLinkButton" class="sheet__action" type="button">复制详情链接</button>
    </div>
  </div>

  <script src="./chengdu-sector-map.js"></script>
  <script src="./project-detail.js"></script>
</body>
</html>
